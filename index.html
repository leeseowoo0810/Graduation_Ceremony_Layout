<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Title & Meta tags -->
    <title>🎓 수료식 배치도 조회 서비스</title>
    <meta name="description" content="수료식 훈련병들의 중대별 좌석 배치도 및 좌석 위치를 신속하게 검색하고 확인할 수 있는 온라인 배치도 조회 서비스입니다.">
    <meta name="keywords" content="수료식, 배치도, 좌석조회, 훈련소, 훈련병 위치">
    
    <!-- Premium Web Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header class="header">
        <h1 class="title">
            수료식 배치도 조회
        </h1>
        <p class="subtitle">
            훈련병의 이름과 전화번호를 입력하여 좌석 위치를 빠르게 찾아보세요.
        </p>
    </header>

    <main class="main-content">
        <!-- 검색 영역 카드 -->
        <section class="search-section">
            <div class="search-card" id="searchContainer">
                <div class="input-group">
                    <div class="select-wrapper">
                        <select id="company" aria-label="중대 선택">
                            <option value="">중대 선택 (선택사항)</option>
                            <option value="9">9중대</option>
                            <option value="10">10중대</option>
                            <option value="11">11중대</option>
                            <option value="12">12중대</option>
                        </select>
                    </div>

                    <input
                        type="text"
                        id="nameInput"
                        placeholder="훈련병 이름"
                        aria-label="훈련병 이름 입력"
                        autocomplete="off">

                    <input
                        type="text"
                        id="phoneInput"
                        placeholder="전화번호 입력"
                        aria-label="전화번호 입력"
                        autocomplete="off">
                </div>

                <button id="searchBtn" type="button">
                    <span class="btn-icon">🔍</span> 조회하기
                </button>
            </div>
        </section>

        <!-- 조회 결과 표시 카드 (검색 완료 시 활성화) -->
        <section class="result-section">
            <div class="result-card" id="resultCard" style="display: none;">
                <div class="result-title">
                    조회 결과
                </div>
                <div class="result-body" id="resultBody">
                    이름과 전화번호를 입력해주세요.
                </div>
            </div>
        </section>

        <!-- 단상 영역 (지휘 단상 지시계) -->
        <div class="stage-container">
            <div class="stage" id="stageIndicator">
                단 상 (STAGE)
            </div>
        </div>

        <!-- 1단계: 메인 중대 선택 화면 (가로 배치 12-11-10-9) -->
        <section class="view-section selection-view" id="selectionView">
            <h2 class="section-title">배치도를 확인할 중대를 선택하세요</h2>
            <div class="company-buttons">
                <button class="comp-select-btn" data-target="12" id="btnCompany12" type="button">
                    <span class="comp-num">12</span>
                    <span class="comp-label">중대</span>
                </button>
                <button class="comp-select-btn" data-target="11" id="btnCompany11" type="button">
                    <span class="comp-num">11</span>
                    <span class="comp-label">중대</span>
                </button>
                <button class="comp-select-btn" data-target="10" id="btnCompany10" type="button">
                    <span class="comp-num">10</span>
                    <span class="comp-label">중대</span>
                </button>
                <button class="comp-select-btn" data-target="9" id="btnCompany9" type="button">
                    <span class="comp-num">9</span>
                    <span class="comp-label">중대</span>
                </button>
            </div>
            <h2 class="section-title">중대 순서는 위와 같은 순서로 위치하고 있습니다</h2>
        </section>

        <!-- 2단계: 개별 중대 상세 확장 뷰 -->
        <section class="view-section detail-view" id="detailView" style="display: none;">
            <div class="detail-header">
                <button id="backBtn" class="back-btn" type="button">
                    <span class="back-icon">⬅</span> 이전으로 돌아가기
                </button>
                <h2 class="active-title" id="activeTitle">중대 배치도</h2>
            </div>

            <div class="company-layout" id="companyLayout">
                <div class="company-wrapper" id="wrapper9" style="display: none;">
                    <div class="company-box" id="company9"></div>
                </div>

                <div class="company-wrapper" id="wrapper10" style="display: none;">
                    <div class="company-box" id="company10"></div>
                </div>

                <div class="company-wrapper" id="wrapper11" style="display: none;">
                    <div class="company-box" id="company11"></div>
                </div>

                <div class="company-wrapper" id="wrapper12" style="display: none;">
                    <div class="company-box" id="company12"></div>
                </div>
            </div>
        </section>
    </main>

</div>

<script src="script.js"></script>

</body>
</html>
